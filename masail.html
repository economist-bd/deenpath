<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>মাসায়েল — শরয়ী প্রশ্নোত্তর | দ্বীনপথ</title>
<meta name="description" content="দৈনন্দিন জীবনের শরয়ী মাসায়েল ও প্রশ্নোত্তর। নামাজ, রোজা, পবিত্রতা, পরিবার বিষয়ক বিধান।">
<meta name="theme-color" content="#0b3024">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .masail-accordion { display: flex; flex-direction: column; gap: 12px; max-width: 760px; margin: 0 auto; }
  .acc-item { background: var(--white); border: 1px solid var(--bone-200); border-radius: var(--radius-md); overflow: hidden; }
  .acc-head { width: 100%; text-align: right; padding: 18px 22px; display: flex; justify-content: space-between; align-items: center; background: none; border: none; gap: 12px; }
  .acc-head .q { font-weight: 700; color: var(--ink-900); font-size: 0.98rem; }
  .acc-icon { flex-shrink: 0; color: var(--green-700); transition: transform 0.2s; font-size: 1.1rem; }
  .acc-item.open .acc-icon { transform: rotate(45deg); }
  .acc-body { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }
  .acc-item.open .acc-body { max-height: 600px; }
  .acc-body-inner { padding: 0 22px 20px; color: var(--ink-700); line-height: 1.85; font-size: 0.95rem; border-top: 1px solid var(--bone-200); padding-top: 16px; }

  .ask-section {
    background: var(--green-900); border-radius: var(--radius-lg); padding: 40px 30px; color: var(--white);
    max-width: 760px; margin: 50px auto 0; position: relative; overflow: hidden;
  }
  .ask-section h2 { color: var(--white); margin-bottom: 8px; }
  .ask-section p { color: rgba(255,255,255,0.7); margin-bottom: 24px; }
  .ask-form { display: flex; flex-direction: column; gap: 14px; position: relative; z-index: 2; }
  .ask-form select, .ask-form textarea, .ask-form input {
    width: 100%; padding: 13px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.07); color: var(--white); font-family: var(--font-body); font-size: 0.95rem; outline: none;
  }
  .ask-form select option { color: var(--ink-900); }
  .ask-form textarea { resize: vertical; min-height: 100px; }
  .ask-form input::placeholder, .ask-form textarea::placeholder { color: rgba(255,255,255,0.45); }
</style>
</head>
<body>

<section class="page-hero">
  <div class="octagon-pattern"></div>
  <div class="container">
    <div class="breadcrumb"><a href="index.html">হোম</a> / মাসায়েল</div>
    <h1>⚖️ মাসায়েল</h1>
    <p>দৈনন্দিন জীবনের শরয়ী প্রশ্ন ও বিধান — বিষয় অনুযায়ী সাজানো।</p>
  </div>
</section>

<section class="section-tight">
  <div class="container">
    <div class="masail-accordion" id="masailAccordion"></div>

    <div class="ask-section" id="ask">
      <div class="octagon-pattern" style="opacity:0.06;"></div>
      <h2>আপনার প্রশ্ন জিজ্ঞাসা করুন</h2>
      <p>আপনার ব্যক্তিগত শরয়ী জিজ্ঞাসা পাঠান। বিজ্ঞ আলেমগণ পরবর্তীতে উত্তর প্রদান করবেন।</p>
      <form class="ask-form" id="askForm">
        <select required id="askCategory">
          <option value="" disabled selected>বিষয় নির্বাচন করুন</option>
        </select>
        <textarea required id="askQuestion" placeholder="আপনার প্রশ্নটি বিস্তারিত লিখুন..."></textarea>
        <input type="text" id="askName" placeholder="আপনার নাম (ঐচ্ছিক)">
        <button type="submit" class="btn btn-primary">প্রশ্ন জমা দিন</button>
      </form>
    </div>
  </div>
</section>

<script src="data.js"></script>
<script src="common.js"></script>
<script type="module" src="firebase-config.js"></script>
<script>
const MASAIL_QA = [
  // ===== নামাজ =====
  { cat:"নামাজ", q:"নামাজে ভুলে কোনো রাকাত বাদ পড়লে কী করবেন?", a:"স্মরণ হওয়ার সাথে সাথে বাদ পড়া রাকাত আদায় করে শেষে সাহু সিজদা দিতে হবে। নামাজ শেষ হওয়ার পরে স্মরণ হলে, ওয়াক্ত পার না হয়ে থাকলে পুনরায় নামাজ পড়তে হবে। এই বিষয়ে স্থানীয় আলেমের পরামর্শ নেওয়া উত্তম।" },
  { cat:"নামাজ", q:"জামাতে নামাজ পড়া কি ফরজ?", a:"পুরুষদের জন্য জামাতে নামাজ পড়া অত্যন্ত গুরুত্বপূর্ণ ও মুস্তাহাবে মুআক্কাদা পর্যায়ের। অনেক আলেমের মতে বিনা কারণে জামাত ত্যাগ করা গুনাহের কাজ। অসুস্থতা বা অপারগতা থাকলে একা নামাজ পড়া যায়।" },
  { cat:"নামাজ", q:"ফজরের নামাজ কাজা হলে কখন পড়তে হবে?", a:"ফজরের নামাজ কাজা হলে সূর্যোদয়ের পর যেকোনো সময় কাজা আদায় করা যায়। তবে সূর্যোদয়ের পরপরই ইসতিওয়ার সময় (সূর্য মধ্যগগনে থাকার সময়) পড়া মাকরুহ। স্মরণ হওয়ার সাথে সাথে আদায় করে নেওয়া উত্তম।" },
  { cat:"নামাজ", q:"মুসাফির অবস্থায় নামাজ কিভাবে পড়তে হয়?", a:"৪৮ মাইল (প্রায় ৭৭ কি.মি.) বা তার বেশি দূরত্বে সফর করলে মুসাফির হিসেবে গণ্য হয়। মুসাফির অবস্থায় চার রাকাতবিশিষ্ট ফরজ নামাজ (জুহর, আসর, এশা) কসর করে দুই রাকাত পড়তে হয়।" },
  { cat:"নামাজ", q:"নামাজে সিজদা সাহু কখন দিতে হয়?", a:"নামাজে ওয়াজিব আমল ভুলে বাদ পড়লে বা ভুলে অতিরিক্ত কিছু আদায় হলে শেষ বৈঠকে সালামের আগে সাহু সিজদা দিতে হয়। দুটি সিজদা দিয়ে পুনরায় আত্তাহিয়্যাতু পড়ে সালাম ফিরাতে হয়।" },
  { cat:"নামাজ", q:"তারাবির নামাজ কত রাকাত?", a:"হানাফী মাযহাব অনুযায়ী তারাবির নামাজ ২০ রাকাত। এটি সুন্নতে মুআক্কাদা। রমজান মাসে এশার নামাজের পর এবং বিতরের আগে পড়তে হয়।" },
  { cat:"নামাজ", q:"জুমার নামাজ কার উপর ফরজ?", a:"প্রাপ্তবয়স্ক, সুস্থ, মুকিম (স্থায়ী বাসিন্দা) পুরুষের উপর জুমার নামাজ ফরজ। মহিলা, মুসাফির, অসুস্থ ব্যক্তি ও নাবালেগের উপর ফরজ নয়, তবে তারা পড়লে আদায় হয়।" },
  { cat:"নামাজ", q:"নামাজে মোবাইল বেজে উঠলে কী করবেন?", a:"নামাজের মধ্যে মোবাইল বেজে উঠলে নামাজ ভাঙে না, তবে মনোযোগ নষ্ট হয়। নামাজে প্রবেশের আগে অবশ্যই মোবাইল সাইলেন্ট বা বন্ধ রাখা উচিত। অন্যের নামাজ নষ্ট হওয়ার কারণে এটি অবহেলা করা উচিত নয়।" },
  { cat:"নামাজ", q:"ইমামের পেছনে সূরা পড়তে হবে কি?", a:"হানাফী মাযহাব অনুযায়ী ইমামের পেছনে মুক্তাদির কোনো কিরাআত পড়তে হয় না। ইমামের কিরাআতই মুক্তাদির কিরাআত হিসেবে গণ্য হয়। তবে চুপচাপ মনোযোগ দিয়ে ইমামের তেলাওয়াত শুনতে হবে।" },
  { cat:"নামাজ", q:"নামাজে হাসলে কি নামাজ নষ্ট হয়?", a:"নামাজের মধ্যে声에 হাসলে (অন্যরা শুনতে পেলে) নামাজ ও ওযু উভয়ই নষ্ট হয়ে যায়। মনে মনে হাসলে বা মুচকি হাসলে শুধু নামাজ নষ্ট হয়, ওযু নষ্ট হয় না।" },

  // ===== রোজা ও সিয়াম =====
  { cat:"রোজা ও সিয়াম", q:"রোজা অবস্থায় ভুলবশত পানাহার করলে রোজা ভাঙবে কি?", a:"না, ভুলবশত পানাহার করলে রোজা ভাঙে না। স্মরণ হওয়ার সাথে সাথে খাওয়া-দাওয়া বন্ধ করে রোজা চালিয়ে যেতে হবে। এটি আল্লাহর পক্ষ থেকে রহমত হিসেবে গণ্য।" },
  { cat:"রোজা ও সিয়াম", q:"সফরে রোজা না রাখলে কাফফারা দিতে হবে কি?", a:"সফরে রোজা না রাখলে কাফফারা দিতে হয় না, বরং পরবর্তীতে কাজা (একই সংখ্যক রোজা) আদায় করতে হবে। কাফফারা কেবল ইচ্ছাকৃতভাবে রোজা ভঙ্গ করলে প্রযোজ্য হয়।" },
  { cat:"রোজা ও সিয়াম", q:"রোজা অবস্থায় ইনজেকশন নেওয়া যাবে কি?", a:"রোজা অবস্থায় চিকিৎসার জন্য সাধারণ ইনজেকশন নেওয়া যায়, এতে রোজা ভাঙে না। তবে গ্লুকোজ বা পুষ্টিজাতীয় স্যালাইন শিরায় নেওয়া হলে রোজা ভেঙে যায়।" },
  { cat:"রোজা ও সিয়াম", q:"নফল রোজা ভেঙে ফেললে কাজা দিতে হবে কি?", a:"হানাফী মাযহাব অনুযায়ী নফল রোজা শুরু করে ভেঙে ফেললে তার কাজা আদায় করতে হয়। তাই নফল রোজার ব্যাপারে সতর্ক থাকা উচিত।" },
  { cat:"রোজা ও সিয়াম", q:"রোজা অবস্থায় চোখে ড্রপ দেওয়া যাবে কি?", a:"চোখে ড্রপ দিলে সাধারণত রোজা ভাঙে না, কারণ চোখ পেট পর্যন্ত পৌঁছার স্বাভাবিক পথ নয়। তবে যদি গলায় ওষুধের স্বাদ অনুভূত হয়, তবে সতর্ক থাকা ভালো এবং আলেমের পরামর্শ নেওয়া উচিত।" },
  { cat:"রোজা ও সিয়াম", q:"কাজা রোজা রাখার সর্বশেষ সীমা কখন?", a:"পরবর্তী রমজান শুরুর আগ পর্যন্ত কাজা রোজা আদায় করতে হবে। পরবর্তী রমজান এসে গেলেও কাজা রোজা মাফ হয় না, বরং কাজা রোজার পাশাপাশি ফিদইয়া দিতে হবে।" },
  { cat:"রোজা ও সিয়াম", q:"রোজা রেখে দাঁত ব্রাশ করা যাবে কি?", a:"রোজা অবস্থায় পেস্ট ছাড়া শুধু ব্রাশ দিয়ে দাঁত পরিষ্কার করা যায়। পেস্ট ব্যবহার করা মাকরুহ, কারণ পেস্টের কোনো অংশ গলায় চলে যাওয়ার আশঙ্কা থাকে। মেসওয়াক করা সুন্নত।" },

  // ===== পবিত্রতা =====
  { cat:"পবিত্রতা", q:"ওযু অবস্থায় রক্ত বের হলে ওযু ভাঙবে কি?", a:"হানাফী মাযহাব অনুযায়ী, শরীরের কোনো স্থান থেকে রক্ত প্রবাহিত হয়ে গড়িয়ে পড়লে ওযু ভেঙে যায়। তবে শুধু রক্ত দেখা দিলে কিন্তু গড়িয়ে না পড়লে ওযু ভাঙে না।" },
  { cat:"পবিত্রতা", q:"মোজা পরে ওযু করার নিয়ম কী?", a:"চামড়ার মোটা মোজা (যা পায়ে দীর্ঘ সময় ব্যবহারযোগ্য ও পানি প্রবেশ করে না) পরিহিত থাকলে নির্দিষ্ট সময়সীমার মধ্যে মোজার উপর মাসেহ করা যায়। সাধারণ পাতলা কাপড়ের মোজায় এই বিধান প্রযোজ্য নয়।" },
  { cat:"পবিত্রতা", q:"গোসল ফরজ হলে কি ওযু ছাড়া নামাজ পড়া যায়?", a:"না, গোসল ফরজ হলে নামাজের জন্য অবশ্যই ফরজ গোসল করতে হবে। ফরজ গোসলের মধ্যে ওযুর নিয়তও করা হয়, ফলে আলাদা ওযু করতে হয় না।" },
  { cat:"পবিত্রতা", q:"তায়াম্মুম কখন করা যায়?", a:"পানি না পাওয়া গেলে, পানি ব্যবহারে অসুস্থতা বৃদ্ধির আশঙ্কা থাকলে অথবা এত সামান্য পানি থাকলে যা পান করার জন্য অপরিহার্য, তখন তায়াম্মুম করা যায়।" },
  { cat:"পবিত্রতা", q:"নাপাক কাপড়ে নামাজ পড়লে কি নামাজ হবে?", a:"না, নাপাক কাপড়ে নামাজ সহিহ হয় না। নামাজের জন্য শরীর, কাপড় ও নামাজের স্থান তিনটিই পাক হওয়া শর্ত। নাপাকি পরিষ্কার করে পুনরায় নামাজ পড়তে হবে।" },
  { cat:"পবিত্রতা", q:"হায়েজ অবস্থায় কোরআন তেলাওয়াত করা যাবে কি?", a:"হায়েজ অবস্থায় কোরআন শরীফ স্পর্শ করা ও তেলাওয়াত করা জায়েয নেই। তবে দোয়া ও জিকির করা যায়। পবিত্র হওয়ার পর গোসল করে তেলাওয়াত করতে হবে।" },

  // ===== যাকাত ও সদকা =====
  { cat:"যাকাত ও সদকা", q:"যাকাতের নিসাব কত?", a:"সোনার ক্ষেত্রে প্রায় ৮৭.৪৮ গ্রাম এবং রূপার ক্ষেত্রে প্রায় ৬১২.৩৬ গ্রামের মূল্যমান নিসাব। নগদ অর্থ ও ব্যবসায়িক সম্পদের ক্ষেত্রে সাধারণত রূপার নিসাব হিসাব করা হয়।" },
  { cat:"যাকাত ও সদকা", q:"যাকাত কাদের দেওয়া যায়?", a:"কোরআনে বর্ণিত আট শ্রেণির লোককে যাকাত দেওয়া যায়: ফকির, মিসকিন, যাকাত আদায়কারী কর্মী, নওমুসলিম, দাসমুক্তিতে, ঋণগ্রস্ত, আল্লাহর পথে এবং পথিক। নিজের মা-বাবা, স্বামী/স্ত্রী ও সন্তানকে যাকাত দেওয়া যায় না।" },
  { cat:"যাকাত ও সদকা", q:"ব্যবসায়িক পণ্যে কি যাকাত দিতে হয়?", a:"হ্যাঁ, বছর শেষে ব্যবসায়িক পণ্যের মূল্য নিসাব পরিমাণ বা তার বেশি হলে মোট মূল্যের ২.৫% যাকাত দিতে হয়।" },
  { cat:"যাকাত ও সদকা", q:"ফিতরা কখন ও কত দিতে হয়?", a:"রমজানের শেষে ঈদুল ফিতরের আগে ফিতরা দেওয়া উত্তম। ঈদের নামাজের আগে দেওয়া সুন্নত। পরিমাণ হলো একজনের জন্য প্রায় ১.৬৫ কেজি গম বা সমপরিমাণ মূল্য।" },
  { cat:"যাকাত ও সদকা", q:"গহনার উপর কি যাকাত ফরজ?", a:"যদি গহনা ব্যবহারের জন্য না হয়ে সঞ্চয় হিসেবে রাখা হয় এবং নিসাব পরিমাণ হয় তাহলে যাকাত ফরজ। ব্যবহারযোগ্য গহনার উপর যাকাতের বিষয়ে মতভেদ রয়েছে।" },

  // ===== বিবাহ ও পরিবার =====
  { cat:"বিবাহ ও পরিবার", q:"বিবাহের জন্য অভিভাবকের সম্মতি কি আবশ্যক?", a:"হানাফী মাযহাব অনুযায়ী প্রাপ্তবয়স্ক নারী নিজের সম্মতিতে বিবাহ করতে পারেন, তবে অভিভাবকের সম্মতি ও পারিবারিক সিদ্ধান্তে অংশগ্রহণ অত্যন্ত গুরুত্বপূর্ণ এবং সামাজিক ও শরয়ী দৃষ্টিকোণ থেকে সুপারিশযোগ্য।" },
  { cat:"বিবাহ ও পরিবার", q:"মোহরানা কি বিবাহের আবশ্যিক অংশ?", a:"হ্যাঁ, মোহরানা বিবাহের একটি আবশ্যিক শর্ত। মোহর নির্ধারণ ছাড়া বিবাহ পড়ানো হলেও মোহর স্বয়ংক্রিয়ভাবে মোহরে মিসল (সমাজে প্রচলিত মোহর) হিসেবে নির্ধারিত হয়ে যায়।" },
  { cat:"বিবাহ ও পরিবার", q:"তালাকের পর ইদ্দত কতদিন?", a:"তালাকের পর স্ত্রীকে তিন মাসিক স্রাব পর্যন্ত ইদ্দত পালন করতে হয়। গর্ভবতী হলে সন্তান প্রসব পর্যন্ত ইদ্দত। স্বামীর মৃত্যুতে ইদ্দত চার মাস দশ দিন।" },
  { cat:"বিবাহ ও পরিবার", q:"সৎ মায়ের সাথে কি বিবাহ হারাম?", a:"হ্যাঁ, পিতার স্ত্রী (সৎ মা) চিরতরে হারাম, এমনকি পিতার মৃত্যু বা তালাকের পরেও। এটি কোরআনে স্পষ্টভাবে নিষিদ্ধ করা হয়েছে।" },
  { cat:"বিবাহ ও পরিবার", q:"খুলার বিধান কী?", a:"স্ত্রী যদি স্বামীকে মোহর বা অন্য কিছু ফিরিয়ে দিয়ে বিবাহ বিচ্ছেদ চান, তবে তাকে খুলা বলে। খুলার মাধ্যমে এক তালাক বায়েন হয় এবং ইদ্দত পালন করতে হয়।" },

  // ===== হালাল ও হারাম =====
  { cat:"হালাল ও হারাম", q:"সুদ গ্রহণ কি সম্পূর্ণ হারাম?", a:"হ্যাঁ, সুদ (রিবা) গ্রহণ ও প্রদান উভয়ই কোরআন ও হাদিসে কঠোরভাবে হারাম করা হয়েছে। সুদের সাথে জড়িত লেখক, সাক্ষী সকলেই গুনাহগার বলে হাদিসে উল্লেখ আছে।" },
  { cat:"হালাল ও হারাম", q:"মুসলমান কি অমুসলিমের বাড়িতে খেতে পারবেন?", a:"অমুসলিমের বাড়িতে খাওয়া জায়েয, যদি পরিবেশিত খাবার হালাল হয়। হারাম খাবার বা মদ থাকলে তা খাওয়া যাবে না। ভদ্রতার সাথে হারাম থেকে বিরত থাকতে হবে।" },
  { cat:"হালাল ও হারাম", q:"ফটোগ্রাফি ও ভিডিওগ্রাফি কি হালাল?", a:"এই বিষয়ে আলেমদের মধ্যে মতভেদ রয়েছে। তবে সাধারণভাবে হালাল উদ্দেশ্যে (শিক্ষা, স্মৃতি সংরক্ষণ) ফটোগ্রাফি অনেক আলেম জায়েয মনে করেন। অশ্লীল বা হারাম উদ্দেশ্যে হারাম।" },
  { cat:"হালাল ও হারাম", q:"গান শোনা কি হারাম?", a:"অধিকাংশ ক্লাসিক্যাল আলেমের মতে বাদ্যযন্ত্রসহ গান হারাম বা মাকরুহ। তবে ইসলামী নাশিদ (বাদ্যযন্ত্র ছাড়া) জায়েয। এই বিষয়ে বিশ্বস্ত আলেমের পরামর্শ নেওয়া উচিত।" },
  { cat:"হালাল ও হারাম", q:"বীমা করা কি হালাল?", a:"প্রচলিত সুদভিত্তিক বীমা হারাম। তবে ইসলামী তাকাফুল বীমা হালাল বিকল্প। যেসব ক্ষেত্রে আইনত বাধ্যতামূলক (যেমন গাড়ির বীমা), সেখানে বিস্তারিত আলেমের সাথে পরামর্শ করুন।" },
  { cat:"হালাল ও হারাম", q:"ক্রিপ্টোকারেন্সি কি হালাল?", a:"ক্রিপ্টোকারেন্সির হালাল-হারাম বিষয়ে আলেমদের মধ্যে মতভেদ আছে। কেউ কেউ জায়েয বলেন, কেউ অনুমোদন দেন না। বর্তমান পরিস্থিতিতে বিশ্বস্ত ইসলামিক আর্থিক বিশেষজ্ঞের পরামর্শ নেওয়া উত্তম।" },

  // ===== হজ ও উমরা =====
  { cat:"হজ ও উমরা", q:"হজ কার উপর ফরজ?", a:"সুস্থ, প্রাপ্তবয়স্ক, সম্পদশালী মুসলমানের উপর জীবনে একবার হজ ফরজ। 'সম্পদশালী' মানে নিজের ও পরিবারের প্রয়োজন মিটিয়ে হজের খরচ বহন করতে সক্ষম হওয়া।" },
  { cat:"হজ ও উমরা", q:"হজে বদল কি জায়েয?", a:"হ্যাঁ, মৃত ব্যক্তির পক্ষ থেকে বা এমন অসুস্থ ব্যক্তির পক্ষ থেকে যার সুস্থ হওয়ার আশা নেই, তাদের পক্ষ থেকে হজে বদল জায়েয। বদল আদায়কারীকে নিজের হজ আগে করতে হবে।" },
  { cat:"হজ ও উমরা", q:"ইহরাম অবস্থায় কী কী নিষিদ্ধ?", a:"ইহরাম অবস্থায় সেলাই করা কাপড় পরা, মাথা ঢাকা (পুরুষের জন্য), সুগন্ধি ব্যবহার, চুল ও নখ কাটা, শিকার করা, স্বামী-স্ত্রী সহবাস এবং ঝগড়া বিবাদ নিষিদ্ধ।" },
  { cat:"হজ ও উমরা", q:"তাওয়াফের নিয়ম কী?", a:"কাবাকে বামে রেখে ঘড়ির বিপরীত দিকে সাত চক্কর দেওয়াকে তাওয়াফ বলে। প্রতিটি চক্কর হাজরে আসওয়াদ থেকে শুরু এবং সেখানেই শেষ। তাওয়াফে ওযু থাকা জরুরি।" },

  // ===== আকিদা ও বিশ্বাস =====
  { cat:"আকিদা ও বিশ্বাস", q:"ইসলামের মূল স্তম্ভ কয়টি ও কী কী?", a:"ইসলামের মূল স্তম্ভ পাঁচটি: কালিমা শাহাদাত (আল্লাহর একত্ব ও মুহাম্মদ (সা.)-এর রিসালাতের সাক্ষ্য), নামাজ, রোজা, যাকাত এবং হজ।" },
  { cat:"আকিদা ও বিশ্বাস", q:"কুফর কি ও তা থেকে বেঁচে থাকার উপায় কী?", a:"কুফর মানে ইসলামের মৌলিক বিষয় অস্বীকার করা বা তার বিপরীতে বিশ্বাস রাখা। এ থেকে বাঁচতে সহিহ আকিদা শেখা, আলেমদের সাথে পরামর্শ করা এবং কোরআন-হাদিস অনুযায়ী জীবন পরিচালনা করা জরুরি।" },
  { cat:"আকিদা ও বিশ্বাস", q:"কবর আযাব কি সত্য?", a:"হ্যাঁ, কবর আযাব হাদিসে সহিহভাবে প্রমাণিত। কোরআনেও পরোক্ষভাবে এর ইঙ্গিত রয়েছে। আহলুস সুন্নাহ ওয়াল জামাআহর সকল আলেম এটি সত্য বলে বিশ্বাস করেন।" },
  { cat:"আকিদা ও বিশ্বাস", q:"তাকদিরে বিশ্বাস না করলে কি ঈমান থাকে?", a:"না, তাকদিরে বিশ্বাস ঈমানের ছয়টি মূল স্তম্ভের একটি। এতে অবিশ্বাস করলে ঈমান পূর্ণ হয় না। তাকদির মানে সৎকর্ম ছেড়ে দেওয়া নয়, বরং চেষ্টা করে আল্লাহর উপর ভরসা রাখা।" },

  // ===== দোয়া ও জিকির =====
  { cat:"দোয়া ও জিকির", q:"ফরজ নামাজের পর কোন দোয়া পড়বেন?", a:"ফরজ নামাজের পর আয়াতুল কুরসি, সূরা ইখলাস, ফালাক ও নাস পড়া সুন্নত। এছাড়া সুবহানাল্লাহ (৩৩ বার), আলহামদুলিল্লাহ (৩৩ বার), আল্লাহু আকবার (৩৩+১ বার) পড়া উত্তম।" },
  { cat:"দোয়া ও জিকির", q:"দোয়া কবুলের বিশেষ সময় কোনগুলো?", a:"দোয়া কবুলের বিশেষ সময়: জুমার দিন আসর থেকে মাগরিবের মধ্যে, রাতের শেষ তৃতীয়াংশে (তাহাজ্জুদের সময়), আজানের পর, সিজদার মধ্যে এবং ইফতারের সময়।" },
  { cat:"দোয়া ও জিকির", q:"ইস্তিগফার কী ও কেন পড়বেন?", a:"ইস্তিগফার মানে আল্লাহর কাছে ক্ষমা চাওয়া। 'আস্তাগফিরুল্লাহ' বলা সবচেয়ে সহজ ইস্তিগফার। নবী করিম (সা.) দিনে ৭০ থেকে ১০০ বার ইস্তিগফার পড়তেন। পাপ মোচন ও রিজিক বৃদ্ধিতে ইস্তিগফার বিশেষ কার্যকর।" },

  // ===== লেনদেন ও অর্থনীতি =====
  { cat:"লেনদেন ও অর্থনীতি", q:"ইসলামী ব্যাংকিং কি সত্যিই সুদমুক্ত?", a:"আদর্শ ইসলামী ব্যাংকিং মুশারাকা, মুরাবাহা ও ইজারা পদ্ধতিতে পরিচালিত হয় যা সুদমুক্ত। তবে সব ইসলামী ব্যাংক সম্পূর্ণ শরিয়তসম্মত কিনা তা যাচাই করা জরুরি। বিশ্বস্ত শরিয়া বোর্ড আছে এমন ব্যাংক বেছে নিন।" },
  { cat:"লেনদেন ও অর্থনীতি", q:"ধার দেওয়া অর্থে কি অতিরিক্ত নেওয়া যায়?", a:"না, ধার দেওয়া অর্থে যেকোনো অতিরিক্ত (সুদ) নেওয়া হারাম। ধার শুধু সমপরিমাণে ফেরত নেওয়া যাবে। তবে কেউ স্বেচ্ছায় উপহার দিলে তা গ্রহণ করা যায়।" },
  { cat:"লেনদেন ও অর্থনীতি", q:"শেয়ার মার্কেটে বিনিয়োগ কি জায়েয?", a:"হালাল কোম্পানির শেয়ারে বিনিয়োগ করা জায়েয। মদ, সুদ, জুয়া বা হারাম পণ্যে ব্যবসাকারী কোম্পানির শেয়ার কেনা হারাম। ইসলামিক স্ক্রিনিং করে বিনিয়োগ করা উত্তম।" },

  // ===== খাদ্য ও পানীয় =====
  { cat:"খাদ্য ও পানীয়", q:"হালাল কসাই ছাড়া কাটা মাংস খাওয়া যাবে কি?", a:"ইসলামিক পদ্ধতিতে (বিসমিল্লাহ বলে জবাই করা) না কাটা মাংস মুসলমানের জন্য খাওয়া জায়েয নয়। আহলে কিতাব (ইহুদি বা খ্রিষ্টান) কর্তৃক কাটা মাংসের ব্যাপারে মতভেদ আছে।" },
  { cat:"খাদ্য ও পানীয়", q:"জেলাটিন খাওয়া কি হালাল?", a:"শূকর থেকে তৈরি জেলাটিন হারাম। হালাল জবাই করা পশু থেকে তৈরি জেলাটিন হালাল। সামুদ্রিক প্রাণী থেকে তৈরি জেলাটিন সাধারণত হালাল। খাবারের প্যাকেটে উৎস যাচাই করা জরুরি।" },
  { cat:"খাদ্য ও পানীয়", q:"অ্যালকোহলযুক্ত পারফিউম ব্যবহার করা কি হারাম?", a:"বাহ্যিক ব্যবহারের জন্য অ্যালকোহলযুক্ত পারফিউম ব্যবহারে অধিকাংশ আলেম অনুমতি দেন, কারণ এটি পান করা হয় না। তবে কেউ কেউ মাকরুহ বলেন। আলেমের পরামর্শ নেওয়া ভালো।" },

  // ===== ইবাদত ও আমল =====
  { cat:"ইবাদত ও আমল", q:"নফল ইবাদতের মধ্যে সবচেয়ে উত্তম কোনটি?", a:"নফল ইবাদতের মধ্যে তাহাজ্জুদের নামাজ সবচেয়ে উত্তম বলে হাদিসে উল্লেখ আছে। এছাড়া কোরআন তেলাওয়াত, দরুদ পাঠ, ইস্তিগফার ও দান-সদকাও অত্যন্ত গুরুত্বপূর্ণ নফল ইবাদত।" },
  { cat:"ইবাদত ও আমল", q:"কোরআন খতম করার কোনো নির্দিষ্ট সময় আছে কি?", a:"কোরআন খতমের কোনো নির্দিষ্ট সময়সীমা নেই। তবে বুঝে পড়ার সুযোগ থাকলে এতটা তাড়াতাড়ি পড়া উচিত নয় যে তেলাওয়াতের মর্যাদা না থাকে। হাদিসে সর্বোচ্চ তিন দিনে খতম করার বিষয়ে উৎসাহ দেওয়া হয়েছে।" },
  { cat:"ইবাদত ও আমল", q:"দোয়া করার সময় হাত তোলা কি সুন্নত?", a:"হ্যাঁ, দোয়া করার সময় উভয় হাত তুলে দোয়া করা সুন্নত এবং দোয়া কবুলের একটি আদব। হাদিসে এটি প্রমাণিত। নামাজের মধ্যে সিজদায় হাত না তুলে দোয়া করতে হয়।" },
  { cat:"ইবাদত ও আমল", q:"রাতের বিতর নামাজ কি ছেড়ে দেওয়া যায়?", a:"বিতরের নামাজ ওয়াজিব (হানাফী মতে)। বিনা কারণে ছেড়ে দেওয়া গুনাহ। অসুস্থতা বা ভুলে পড়তে না পারলে পরে কাজা আদায় করতে হবে।" },

  // ===== সামাজিক বিধান =====
  { cat:"সামাজিক বিধান", q:"মিথ্যা বলা কি সবসময় হারাম?", a:"সাধারণত মিথ্যা হারাম। তবে যুদ্ধের সময়, মানুষের মধ্যে মিলন করাতে এবং স্বামী-স্ত্রীর মধ্যে সম্পর্ক উন্নয়নে কিছু মিথ্যা জায়েয বলে হাদিসে উল্লেখ আছে।" },
  { cat:"সামাজিক বিধান", q:"গীবত কী ও এর শাস্তি কী?", a:"গীবত মানে কারো অনুপস্থিতিতে এমন কথা বলা যা সত্য কিন্তু সে অপছন্দ করবে। কোরআনে গীবতকে মৃত ভাইয়ের মাংস খাওয়ার সাথে তুলনা করা হয়েছে। এটি কবিরা গুনাহ।" },
  { cat:"সামাজিক বিধান", q:"বেগানা নারী-পুরুষের মধ্যে হাত মেলানো কি জায়েয?", a:"অধিকাংশ আলেমের মতে বেগানা নারী-পুরুষের মধ্যে হাত মেলানো জায়েয নয়। এটি ফেতনার কারণ হতে পারে। বিনম্রভাবে হাত না মেলানোর কারণ ব্যাখ্যা করা যায়।" },
  { cat:"সামাজিক বিধান", q:"কাউকে অভিশাপ দেওয়া কি জায়েয?", a:"নির্দিষ্ট কোনো মুসলমানকে অভিশাপ দেওয়া জায়েয নয়। তবে জালেম ও কাফেরদের প্রতি সাধারণভাবে বদদোয়া করা যায়। মুসলমানের জন্য সর্বদা ক্ষমা ও হেদায়েতের দোয়া করা উত্তম।" },

  // ===== কুরআন ও হাদিস =====
  { cat:"কুরআন ও হাদিস", q:"কোরআন শরীফ না বুঝে পড়লেও কি সওয়াব হয়?", a:"হ্যাঁ, কোরআনের প্রতিটি হরফ পাঠে দশটি নেকি হয় বলে হাদিসে বর্ণিত। না বুঝলেও তেলাওয়াতের সওয়াব পাওয়া যায়। তবে বুঝে পড়া আরও উত্তম ও কল্যাণকর।" },
  { cat:"কুরআন ও হাদিস", q:"হাদিস কত প্রকার ও তার গুরুত্ব কী?", a:"হাদিস সহিহ, হাসান ও দ্বঈফ প্রভৃতি শ্রেণিতে বিভক্ত। সহিহ হাদিস দ্বীনের দলিল হিসেবে গ্রহণযোগ্য। দ্বঈফ হাদিস আমলের ক্ষেত্রে সতর্কভাবে ব্যবহার করতে হয়।" },
  { cat:"কুরআন ও হাদিস", q:"কোরআনে কারিম ছুঁতে কি ওযু লাগে?", a:"হানাফী মাযহাব অনুযায়ী কোরআন শরীফ স্পর্শ করতে ওযু থাকা ওয়াজিব। বেওযু অবস্থায় কোরআন স্পর্শ করা জায়েয নয়। তবে কভার বা আবরণ দিয়ে ধরলে কিছু আলেমের মতে জায়েয।" },

  // ===== মৃত্যু ও জানাযা =====
  { cat:"মৃত্যু ও জানাযা", q:"মৃত ব্যক্তির জন্য ঈসালে সওয়াব কি জায়েয?", a:"হ্যাঁ, মৃত ব্যক্তির জন্য দোয়া, কোরআন তেলাওয়াত, দান-সদকা করে সওয়াব পৌঁছানো হানাফী মাযহাব সহ অধিকাংশ আলেমের মতে জায়েয এবং উপকারী।" },
  { cat:"মৃত্যু ও জানাযা", q:"কবর জিয়ারত কি জায়েয?", a:"হ্যাঁ, কবর জিয়ারত সুন্নত। নবী করিম (সা.) নিজে কবর জিয়ারত করতেন এবং উৎসাহিত করতেন। মহিলাদের জন্যও জায়েয তবে ঘন ঘন যাওয়া মাকরুহ।" },
  { cat:"মৃত্যু ও জানাযা", q:"জানাযার নামাজ না পড়লে কি গুনাহ হয়?", a:"জানাযার নামাজ ফরজে কিফায়া। কিছু মুসলমান পড়লে সকলের দায়িত্ব শেষ হয়। কেউ না পড়লে সকলেই গুনাহগার হবেন। সুযোগ থাকলে জানাযায় অংশগ্রহণ করা উচিত।" },
  { cat:"মৃত্যু ও জানাযা", q:"মৃত ব্যক্তির পক্ষে হজ করা যাবে কি?", a:"হ্যাঁ, যদি মৃত ব্যক্তির উপর হজ ফরজ ছিল কিন্তু করতে পারেননি, তাহলে তার পক্ষ থেকে অন্যজন হজ আদায় করতে পারেন। এটি হজে বদল নামে পরিচিত।" },

  // ===== শিক্ষা ও জ্ঞান =====
  { cat:"শিক্ষা ও জ্ঞান", q:"ইসলামে জ্ঞান অর্জনের গুরুত্ব কতটুকু?", a:"ইসলামে জ্ঞান অর্জন ফরজ। নবী করিম (সা.) বলেছেন, 'জ্ঞান অর্জন করা প্রত্যেক মুসলমানের উপর ফরজ।' দ্বীনি ও দুনিয়াবি উভয় জ্ঞানই কাজে লাগানো উচিত।" },
  { cat:"শিক্ষা ও জ্ঞান", q:"অমুসলিমদের কাছ থেকে শিক্ষা নেওয়া কি জায়েয?", a:"হ্যাঁ, দুনিয়াবি জ্ঞান-বিজ্ঞান যেকোনো উৎস থেকে অর্জন করা জায়েয, যদি তা হারামের পথে না নিয়ে যায়। তবে আকিদা ও দ্বীনি বিষয়ে সহিহ আলেমের কাছে শিক্ষা নেওয়া উচিত।" },

  // ===== চিকিৎসা ও স্বাস্থ্য =====
  { cat:"চিকিৎসা ও স্বাস্থ্য", q:"হারাম ওষুধ কি চিকিৎসার জন্য ব্যবহার করা যায়?", a:"সাধারণ নিয়ম হলো হারাম দিয়ে চিকিৎসা করা নিষিদ্ধ। তবে জীবনের হুমকি থাকলে এবং হালাল বিকল্প না থাকলে অনেক আলেম ব্যতিক্রম স্বীকার করেন। বিশ্বস্ত আলেমের পরামর্শ নেওয়া জরুরি।" },
  { cat:"চিকিৎসা ও স্বাস্থ্য", q:"অঙ্গদান (অর্গান ডোনেশন) কি ইসলামে জায়েয?", a:"এই বিষয়ে আলেমদের মধ্যে মতভেদ আছে। কেউ কেউ মৃত্যুর পর অঙ্গদান জায়েয মনে করেন যদি তা জীবন বাঁচাতে সাহায্য করে। তবে জীবিত অবস্থায় এমন অঙ্গদান যা নিজের ক্ষতি করে তা জায়েয নয়।" },
  { cat:"চিকিৎসা ও স্বাস্থ্য", q:"ইসলামে গর্ভপাত সম্পর্কে বিধান কী?", a:"৪ মাসের আগে গর্ভপাত মারাত্মক কারণ (মায়ের জীবনঝুঁকি) ছাড়া সাধারণত জায়েয নয়। ৪ মাসের পর রুহ ফুঁকে দেওয়ার পর গর্ভপাত সম্পূর্ণ হারাম। বিস্তারিতের জন্য আলেমের পরামর্শ নিন।" },

  // ===== পোশাক ও পর্দা =====
  { cat:"পোশাক ও পর্দা", q:"নারীদের জন্য পর্দার বিধান কী?", a:"নারীদের জন্য মাহরাম ছাড়া অন্যদের সামনে মুখ ও হাতের কব্জি ছাড়া সারা শরীর ঢাকা ফরজ। মুখ ঢাকার ব্যাপারে মতভেদ আছে তবে মুখ ঢাকা উত্তম বলে অনেক আলেম মনে করেন।" },
  { cat:"পোশাক ও পর্দা", q:"পুরুষের পোশাকে কোন রং নিষিদ্ধ?", a:"পুরুষের জন্য বিশেষ কোনো রং নিষিদ্ধ নয়। তবে খাঁটি লাল রঙের কাপড় মাকরুহ বলে অনেক আলেম মনে করেন। হলুদ রং নিয়ে মতভেদ আছে।" },
  { cat:"পোশাক ও পর্দা", q:"পুরুষের জন্য স্বর্ণ পরা কি হারাম?", a:"হ্যাঁ, পুরুষের জন্য স্বর্ণের গহনা পরা হারাম। হাদিসে এটি স্পষ্টভাবে নিষিদ্ধ করা হয়েছে। রুপার আংটি পুরুষের জন্য জায়েয।" },
  { cat:"পোশাক ও পর্দা", q:"টাখনুর নিচে কাপড় পরা কি হারাম?", a:"হাদিস অনুযায়ী অহংকারবশত টাখনুর নিচে কাপড় পরা হারাম। তবে অহংকার ছাড়া হলে মতভেদ আছে। সর্বোত্তম হলো পোশাক টাখনুর উপরে রাখা।" },

  // ===== শিশু ও পরিবার =====
  { cat:"শিশু ও পরিবার", q:"নবজাতকের আজান দেওয়া কি সুন্নত?", a:"হ্যাঁ, নবজাতকের ডান কানে আজান ও বাম কানে ইকামত দেওয়া সুন্নত। এটি শয়তান থেকে রক্ষার একটি উপায় এবং ইসলামের সাথে শিশুর প্রথম পরিচয়।" },
  { cat:"শিশু ও পরিবার", q:"আকিকা কখন ও কীভাবে করতে হয়?", a:"শিশু জন্মের সপ্তম দিনে আকিকা করা সুন্নত। ছেলের জন্য দুটি ও মেয়ের জন্য একটি ছাগল বা সমপরিমাণ। সেদিন শিশুর মাথা মুড়িয়ে ভালো নাম রাখাও সুন্নত।" },
  { cat:"শিশু ও পরিবার", q:"সন্তানদের ইসলামি শিক্ষা দেওয়া কি ফরজ?", a:"হ্যাঁ, পিতামাতার দায়িত্ব সন্তানদের ইসলামী শিক্ষা দেওয়া। এটি ফরজে আইন। সন্তানদের নামাজ, কোরআন, হালাল-হারামের জ্ঞান দেওয়া পিতামাতার উপর ওয়াজিব।" },

  // ===== ব্যবহার ও আখলাক =====
  { cat:"ব্যবহার ও আখলাক", q:"রাগ নিয়ন্ত্রণের ইসলামিক পদ্ধতি কী?", a:"রাগ আসলে: (১) আউযুবিল্লাহ পড়া, (২) দাঁড়িয়ে থাকলে বসে যাওয়া বা শুয়ে পড়া, (৩) ওযু করা, (৪) ঘর থেকে বের হয়ে যাওয়া। নবী করিম (সা.) বলেছেন, সে-ই শক্তিশালী যে রাগ নিয়ন্ত্রণ করতে পারে।" },
  { cat:"ব্যবহার ও আখলাক", q:"প্রতিবেশীর অধিকার কী কী?", a:"প্রতিবেশীর অধিকারের মধ্যে আছে: কষ্ট না দেওয়া, বিপদে সাহায্য করা, উপহার দেওয়া, অসুস্থতায় দেখতে যাওয়া, মৃত্যুতে জানাযায় অংশগ্রহণ করা। হাদিসে প্রতিবেশীর অধিকারকে অত্যন্ত গুরুত্ব দেওয়া হয়েছে।" },
  { cat:"ব্যবহার ও আখলাক", q:"ওয়াদা ভাঙা কি মুনাফিকের লক্ষণ?", a:"হ্যাঁ, হাদিসে মুনাফিকের তিনটি লক্ষণের একটি হলো ওয়াদা ভাঙা। একজন মুমিনের জন্য ওয়াদা রক্ষা করা ঈমানের দাবি। অপারগতার ক্ষেত্রে আগে জানিয়ে দেওয়া উচিত।" },

  // ===== ব্যবসা-বাণিজ্য =====
  { cat:"ব্যবসা-বাণিজ্য", q:"ব্যবসায় মিথ্যা বলা কি হারাম?", a:"হ্যাঁ, ব্যবসায় মিথ্যা বলা হারাম। পণ্যের ত্রুটি লুকানো বা মিথ্যা গুণ বলা প্রতারণা, যা ইসলামে কঠোরভাবে নিষিদ্ধ। নবী (সা.) মিথ্যা ব্যবসায়ীর হস্ত থেকে বরকত উঠে যাওয়ার কথা বলেছেন।" },
  { cat:"ব্যবসা-বাণিজ্য", q:"অগ্রিম বিক্রয় (সালাম চুক্তি) কি ইসলামে জায়েয?", a:"হ্যাঁ, সালাম চুক্তি ইসলামে জায়েয। মূল্য আগে দিয়ে পরে পণ্য গ্রহণের এই পদ্ধতি নির্দিষ্ট শর্তে বৈধ: পণ্যের বিবরণ, পরিমাণ ও সরবরাহের তারিখ নির্ধারিত থাকতে হবে।" },
  { cat:"ব্যবসা-বাণিজ্য", q:"মুনাফা কতটুকু নেওয়া বৈধ?", a:"ইসলামে মুনাফার নির্দিষ্ট সীমা নেই, তবে অতিরিক্ত মুনাফা বা গরিবদের শোষণ করে মুনাফা অর্জন অনুচিত। ন্যায্য মূল্যে ব্যবসা করা উত্তম।" },

  // ===== পরিবেশ ও প্রকৃতি =====
  { cat:"পরিবেশ ও প্রকৃতি", q:"ইসলামে পরিবেশ রক্ষার গুরুত্ব কী?", a:"ইসলামে পরিবেশ রক্ষা একটি ধর্মীয় দায়িত্ব। পানি অপচয় নিষিদ্ধ, গাছ লাগানোকে সদকায়ে জারিয়া বলা হয়েছে এবং পৃথিবীকে আমানত হিসেবে রক্ষা করা প্রতিটি মুসলমানের কর্তব্য।" },
  { cat:"পরিবেশ ও প্রকৃতি", q:"প্রাণী নির্যাতন করা কি গুনাহ?", a:"হ্যাঁ, প্রাণী নির্যাতন করা গুনাহ। হাদিসে একজন মহিলার জাহান্নামে যাওয়ার কথা বলা হয়েছে কারণ সে একটি বিড়ালকে আটকে রেখে না খাইয়ে মেরে ফেলেছিল। প্রাণীদের সাথে দয়ালু আচরণ করা ইসলামের নির্দেশ।" },

  { cat:"বিনোদন ও প্রযুক্তি", q:"ইসলামে কি বিনোদন জায়েয?", a:"হালাল বিনোদন ইসলামে জায়েয। হারাম উপাদান (যেমন অশ্লীলতা, সুদ, জুয়া) মুক্ত খেলাধুলা, ভ্রমণ, সুস্বাদু খাবার ইত্যাদি উপভোগ করা বৈধ।" },
  { cat:"বিনোদন ও প্রযুক্তি", q:"সোশ্যাল মিডিয়া ব্যবহার কি ইসলামে বৈধ?", a:"সোশ্যাল মিডিয়া ব্যবহার বৈধ যদি তা হারামে ব্যবহার না করা হয়। ইসলামিক জ্ঞান শেয়ার, পরিবারের সাথে যোগাযোগ ইত্যাদি উদ্দেশ্যে ব্যবহার উপকারী। গীবত, মিথ্যা, অশ্লীল কনটেন্ট শেয়ার করা হারাম।" },
  { cat:"বিনোদন ও প্রযুক্তি", q:"অনলাইন গেম খেলা কি জায়েয?", a:"অনলাইন গেম খেলা সাধারণত জায়েয, যদি গেমে হারাম উপাদান (জুয়া, অশ্লীলতা, শিরক) না থাকে এবং নামাজ ও অন্যান্য দায়িত্ব পালনে বাধা না হয়।" },

  { cat:"রাজনীতি ও সমাজ", q:"ইসলামে গণতন্ত্র সম্পর্কে বিধান কী?", a:"এই বিষয়ে আলেমদের মতভেদ আছে। কেউ কেউ ইসলামী নীতির মধ্যে থেকে গণতন্ত্রে অংশগ্রহণ জায়েয মনে করেন। মূল বিষয় হলো শরীয়তের বিরুদ্ধে আইন করা হারাম।" },
  { cat:"রাজনীতি ও সমাজ", q:"অমুসলিম দেশে বসবাস করা কি জায়েয?", a:"মুসলমানরা অমুসলিম দেশে বসবাস করতে পারেন যদি তারা ধর্ম পালনে স্বাধীন থাকেন। ইসলাম প্রচারের সুযোগ থাকলে বসবাস আরও উপকারী। ধর্ম পালনে বাধা থাকলে হিজরত করা উচিত।" },

  // ===== দ্বীনি বিষয় =====

  { cat:"দ্বীনি বিষয়", q:"ফতওয়া কে দিতে পারেন?", a:"যোগ্য আলেম যিনি কোরআন, হাদিস, ফিকহ ও উসূলুল ফিকহে পারদর্শী তিনিই ফতওয়া দিতে পারেন। অযোগ্য ব্যক্তির ফতওয়া গ্রহণ করা বিপজ্জনক। বিশ্বস্ত আলেমের কাছে মাসআলা জিজ্ঞেস করা উচিত।" },
  { cat:"দ্বীনি বিষয়", q:"ইসলামে বিদআত কী?", a:"বিদআত হলো দ্বীনের নামে নতুন কোনো আমল যা নবী (সা.) বা সাহাবায়ে কিরাম করেননি। হাদিসে প্রতিটি বিদআতকে পথভ্রষ্টতা বলা হয়েছে। তবে দুনিয়াবি ক্ষেত্রে নতুন পদ্ধতি বিদআত নয়।" },
  { cat:"দ্বীনি বিষয়", q:"মিলাদ পড়া কি জায়েয?", a:"মিলাদের বিষয়ে আলেমদের মতভেদ আছে। দরুদ ও সীরাত আলোচনা ভালো, তবে কিয়াম করা বা বিদআতি আমল যুক্ত করা অনুচিত বলে অনেক আলেম মনে করেন।" },

  // ===== সন্তান লালন-পালন =====
  { cat:"সন্তান লালন-পালন", q:"শিশুদের কোরআন কখন থেকে শেখানো উচিত?", a:"শিশু কথা বলতে শিখলেই আল্লাহর নাম ও ছোট ছোট দোয়া শেখানো শুরু করা উচিত। সাত বছর থেকে নামাজের অভ্যাস ও কোরআন পড়া শেখানো সুন্নত।" },
  { cat:"সন্তান লালন-পালন", q:"সন্তানকে মারধর করা কি ইসলামে জায়েয?", a:"ইসলামে সন্তানকে শিক্ষার উদ্দেশ্যে হালকা শাসন করা জায়েয, তবে কঠোরভাবে মারধর করা নিষিদ্ধ। নবী (সা.) বলেছেন মুখ ও মাথায় কখনো মারবে না। ভালোবাসা ও উৎসাহ দিয়ে শিক্ষা দেওয়াই উত্তম।" },

  // ===== ইসলামী ইতিহাস =====
  { cat:"ইসলামী ইতিহাস", q:"খলিফাদের সংখ্যা ও নাম কী?", a:"খোলাফায়ে রাশেদিন চারজন: হযরত আবু বকর সিদ্দিক (রা.), হযরত উমর ফারুক (রা.), হযরত উসমান গনি (রা.) ও হযরত আলী (রা.)। এঁরা নবী (সা.)-এর ওফাতের পর পর্যায়ক্রমে খলিফা হন।" },
  { cat:"ইসলামী ইতিহাস", q:"হিজরত কত সালে হয়েছিল?", a:"নবী করিম (সা.) ৬২২ খ্রিস্টাব্দে মক্কা থেকে মদিনায় হিজরত করেন। এই ঘটনাকে কেন্দ্র করে ইসলামিক হিজরী সন গণনা শুরু হয়।" },
];

function renderMasailList() {
  const container = document.getElementById("masailAccordion");
  container.innerHTML = MASAIL_QA.map((item, i) => `
    <div class="acc-item" data-i="${i}">
      <button class="acc-head">
        <span class="q">${item.q}</span>
        <span class="acc-icon">+</span>
      </button>
      <div class="acc-body">
        <div class="acc-body-inner">
          <span class="tag" style="margin-bottom:10px; display:inline-block;">${item.cat}</span>
          <p>${item.a}</p>
        </div>
      </div>
    </div>
  `).join("");

  container.querySelectorAll(".acc-item").forEach(item => {
    item.querySelector(".acc-head").addEventListener("click", () => {
      item.classList.toggle("open");
    });
  });
}

function populateCategorySelect() {
  const sel = document.getElementById("askCategory");
  HADITH_CATEGORIES.forEach(cat => {
    const opt = document.createElement("option");
    opt.value = cat;
    opt.textContent = cat;
    sel.appendChild(opt);
  });
}

document.getElementById("askForm").addEventListener("submit", (e) => {
  e.preventDefault();
  showToast("আপনার প্রশ্ন গ্রহণ করা হয়েছে। উত্তর পেতে কিছুদিন অপেক্ষা করুন।");
  e.target.reset();
});

renderMasailList();
populateCategorySelect();
</script>
