let activeDuaCat = Object.keys(DUA_DATA)[0];

function renderDuaCats() {
  const row = document.getElementById("duaCatRow");
  row.innerHTML = Object.keys(DUA_DATA).map(cat => `
    <button class="dua-cat-chip ${cat === activeDuaCat ? "active" : ""}" data-cat="${cat}">${cat}</button>
  `).join("");
  row.querySelectorAll(".dua-cat-chip").forEach(chip => {
    chip.addEventListener("click", () => {
      activeDuaCat = chip.dataset.cat;
      renderDuaCats();
      renderDuaGrid();
    });
  });
}

function copyText(text) {
  navigator.clipboard.writeText(text).catch(() => {});
}

function renderDuaGrid() {
  const list = DUA_DATA[activeDuaCat];
  document.getElementById("catCount").textContent = `${activeDuaCat} — মোট ${list.length}টি দু'আ`;
  const grid = document.getElementById("duaGrid");
  grid.innerHTML = list.map(d => `
    <div class="dua-card">
      <div class="dtitle">${d.title}</div>
      <div class="dar">${d.ar}</div>
      <p class="dbn">${d.bn}</p>
      <p class="dref">— ${d.ref}</p>
      <button class="copy-btn" onclick="copyText('${d.ar.replace(/'/g,"\\'")}')">📋 কপি করুন</button>
    </div>
  `).join("");
}

renderDuaCats();
renderDuaGrid();
</script>
